version: "3.8"

services:
  api:
    build: .
    container_name: docqa_api
    restart: unless-stopped
    command: >
      sh -c "
        echo 'Running Alembic migrations for SQLite...' &&
        alembic upgrade head &&
        echo 'Starting FastAPI server...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    volumes:
      - .:/app   # Optional for hot-reload in dev
      - ./data:/app/data  # Mount data directory for SQLite and FAISS
    env_file:
      - .env
